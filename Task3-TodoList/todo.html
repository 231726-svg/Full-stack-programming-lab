<body>

    <!-- Task 3 -->

        <span id="task3-text">Task 3: Clean the room</span>
        <button onclick="completeTask('task3-text')">Complete</button>
        <button onclick="removeTask('task3')">Remove</button>
    </div>

    <br />
    <button onclick="completeAll()">Complete All</button>

    <script src="todo.js"></script>
</body>

</html>
